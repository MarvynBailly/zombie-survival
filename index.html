<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Outbreak — Zombie Survival</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<!--
  PocketBase collections used by this game (already created on the tailnet PB).
  Schemas for reference:

  proj_zombie_survival_scores
    player_name        text, required, max 24
    score              number (int), required
    waves_survived     number (int), required
    kills              number (int), required
    duration_seconds   number (int), required
    weapon_stats       json
    created            autodate
    list/view/create:  "" (open on tailnet)
    update/delete:     admin-only

  proj_zombie_survival_runs (optional telemetry)
    player_name        text
    events             json
    list/view/update/delete: admin-only
    create:            "" (open)
-->
<style>
  :root {
    --ink:        #0b0c0e;
    --panel:      #14161a;
    --panel2:     #1c1f25;
    --border:     #2a2e36;
    --border-hi:  #3a3f4a;
    --fg:         #e8e6df;
    --muted:      #7a7e88;
    --accent:     #d24b35;
    --accent-deep:#8a2a1a;
    --accent-hi:  #ec6448;
    --toxic:      #8ec547;
    --warn:       #e3a83a;
    --danger:     #c83232;
    --f-display:  "Bebas Neue", Impact, sans-serif;
    --f-body:     "Manrope", "Helvetica Neue", Helvetica, sans-serif;
    --f-mono:     "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: var(--ink);
    color: var(--fg);
    font-family: var(--f-body);
    overflow: hidden;
    user-select: none;
  }
  #app {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #14161a 0%, #07080a 80%);
  }
  canvas#game {
    display: block;
    background: var(--ink);
    image-rendering: pixelated;
    cursor: crosshair;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }

  /* ---------- Overlays ---------- */
  .overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    background: rgba(7,8,10,0.88);
    z-index: 10;
    padding: 20px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    padding: 22px 26px;
    min-width: 340px;
    max-width: 760px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }

  /* ---------- Typography ---------- */
  h1.title {
    margin: 0 0 4px 0;
    font-family: var(--f-display);
    font-size: 72px;
    letter-spacing: 6px;
    color: var(--fg);
    line-height: 0.9;
  }
  h1.title .bleed { color: var(--accent); }
  h2 {
    margin: 0 0 12px 0;
    font-family: var(--f-display);
    font-size: 32px;
    letter-spacing: 4px;
    color: var(--fg);
    line-height: 1;
  }
  .eyebrow {
    font-family: var(--f-mono);
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }
  label {
    display: block;
    font-family: var(--f-body);
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    margin: 12px 0 6px;
    text-transform: uppercase;
  }
  input[type=text] {
    width: 100%;
    background: var(--panel2);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 0;
    padding: 11px 12px;
    font-size: 14px;
    font-family: var(--f-mono);
    letter-spacing: 1px;
  }
  input[type=text]:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--panel);
  }

  /* ---------- Buttons ---------- */
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .row > * { flex: 1 1 auto; }
  button, .btn {
    background: var(--panel2);
    color: var(--fg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: 0;
    padding: 12px 18px;
    font-family: var(--f-display);
    font-size: 16px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, transform 0.05s;
  }
  button:hover {
    background: var(--panel);
    border-left-color: var(--accent);
  }
  button:active { transform: translateY(1px); }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    border-left-color: var(--accent-deep);
    color: #1a0805;
    font-weight: 600;
  }
  button.primary:hover { background: var(--accent-hi); border-left-color: #fff; }
  button.ghost { background: transparent; border-color: var(--border); color: var(--muted); }
  button.ghost:hover { color: var(--fg); border-left-color: var(--muted); }
  .kbd-hint {
    display: inline-block;
    font-family: var(--f-mono);
    font-size: 10px;
    padding: 1px 5px;
    margin-left: 8px;
    border: 1px solid currentColor;
    border-radius: 2px;
    opacity: 0.6;
    letter-spacing: 1px;
    vertical-align: 1px;
  }

  /* ---------- Level cards ---------- */
  .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 10px 0 6px; }
  .level-card {
    background: var(--panel2);
    border: 1px solid var(--border);
    padding: 10px;
    cursor: pointer;
    transition: border-color 0.1s, transform 0.1s;
  }
  .level-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .level-card canvas { width: 100%; height: auto; display: block; }
  .level-card .name {
    margin-top: 8px;
    font-family: var(--f-display);
    font-size: 18px;
    letter-spacing: 2px;
  }
  .level-card .desc {
    color: var(--muted);
    font-size: 11px;
    font-family: var(--f-mono);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  /* ---------- Leaderboard ---------- */
  .lb-table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: var(--f-mono); }
  .lb-table th, .lb-table td { padding: 7px 8px; text-align: left; border-bottom: 1px solid var(--border); }
  .lb-table th {
    color: var(--muted);
    font-weight: 500;
    cursor: pointer;
    font-family: var(--f-body);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .lb-table tr:hover td { background: var(--panel2); }
  .lb-table td:nth-child(3) { color: var(--accent); font-weight: 600; }
  .lb-empty { text-align: center; color: var(--muted); padding: 20px; }

  /* ---------- Controls help ---------- */
  .controls-help { font-size: 13px; color: var(--muted); line-height: 1.8; font-family: var(--f-body); }
  .controls-help kbd {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-bottom: 2px solid var(--border);
    border-radius: 3px;
    padding: 1px 7px;
    color: var(--fg);
    font-family: var(--f-mono);
    font-size: 11px;
    margin: 0 1px;
  }

  /* ---------- HUD ---------- */
  .hud {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }
  .hud-box {
    background: rgba(11,12,14,0.78);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 9px 12px;
    pointer-events: auto;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .hud-head {
    display: flex; align-items: baseline;
    margin-bottom: 6px;
  }
  .hud-head .label {
    font-family: var(--f-display);
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--muted);
    margin: 0;
    padding: 0;
  }
  .hud-head .val {
    margin-left: auto;
    font-family: var(--f-mono);
    font-size: 10px;
    color: var(--muted);
  }

  /* top-left vitals */
  .hud-vitals { position: absolute; top: 14px; left: 14px; width: 240px; }
  .hud-vitals .pips { display: flex; gap: 2px; }
  .hud-vitals .pip {
    flex: 1; height: 10px;
    background: var(--border);
    border-radius: 1px;
    transition: background 0.15s;
  }
  .hud-vitals .pip.on  { background: var(--accent); box-shadow: 0 0 6px rgba(210,75,53,0.35); }
  .hud-vitals .pip.low { background: var(--warn);   box-shadow: 0 0 6px rgba(227,168,58,0.35); }

  /* center wave */
  .hud-wave {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    text-align: center;
    padding: 6px 22px;
    min-width: 130px;
  }
  .hud-wave .lbl {
    font-family: var(--f-body);
    font-size: 10px; letter-spacing: 3px; color: var(--muted);
  }
  .hud-wave .num {
    font-family: var(--f-display);
    font-size: 36px; letter-spacing: 2px;
    color: var(--accent); line-height: 0.9; margin-top: 2px;
  }
  .hud-wave .meta {
    font-family: var(--f-mono);
    font-size: 9px; color: var(--muted); letter-spacing: 1px;
    margin-top: 2px;
  }

  /* top-right stats */
  .hud-stats { position: absolute; top: 14px; right: 14px; width: 200px; }
  .hud-stats .stat-row {
    display: flex; align-items: baseline;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .hud-stats .stat-row:last-child { margin-bottom: 0; }
  .hud-stats .stat-row .l {
    font-family: var(--f-body);
    font-size: 10px; letter-spacing: 2px; color: var(--muted);
  }
  .hud-stats .stat-row .v {
    font-family: var(--f-display);
    font-size: 22px; letter-spacing: 1px; color: var(--fg);
    line-height: 1;
  }
  .hud-stats .stat-row.accent .v { color: var(--accent); }
  .hud-stats .stat-row.muted .v  { color: var(--muted); font-size: 16px; }

  /* bottom-left weapon dock */
  .hud-weapon { position: absolute; left: 14px; bottom: 14px; width: 340px; }
  .hud-weapon .head {
    display: flex; align-items: center; gap: 10px;
  }
  .hud-weapon .head .icon-box {
    width: 36px; height: 36px;
    background: var(--panel2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex: 0 0 auto;
  }
  .hud-weapon .head .meta { flex: 1; min-width: 0; }
  .hud-weapon .head .name {
    font-family: var(--f-display);
    font-size: 18px; letter-spacing: 2px;
  }
  .hud-weapon .head .info {
    font-family: var(--f-mono);
    font-size: 9px; color: var(--muted); letter-spacing: 1px;
  }
  .hud-weapon .head .ammo {
    font-family: var(--f-display);
    font-size: 26px; letter-spacing: 1px; line-height: 0.9;
    text-align: right;
  }
  .hud-weapon .head .ammo .res {
    color: var(--muted); font-size: 14px;
  }
  .hud-weapon .head .ammo.reloading { color: var(--warn); }
  .hud-weapon .mag-bar {
    display: flex; gap: 2px; margin-top: 8px;
    height: 5px;
  }
  .hud-weapon .mag-bar .tick {
    flex: 1; background: var(--border); border-radius: 1px;
  }
  .hud-weapon .mag-bar .tick.on { background: var(--warn); }
  .hud-weapon .slots {
    display: flex; gap: 4px; margin-top: 8px;
  }
  .hud-weapon .slot {
    flex: 1; padding: 4px 0 6px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 3px;
    text-align: center;
    position: relative;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
  }
  .hud-weapon .slot:hover { border-color: var(--border-hi); }
  .hud-weapon .slot.active {
    background: rgba(210,75,53,0.18);
    border-color: var(--accent);
  }
  .hud-weapon .slot.empty { opacity: 0.45; }
  .hud-weapon .slot.locked { opacity: 0.3; filter: grayscale(1); }
  .hud-weapon .slot .key {
    position: absolute; top: 1px; left: 4px;
    font-family: var(--f-mono);
    font-size: 8px; color: var(--muted);
  }
  .hud-weapon .slot .ammo-count {
    font-family: var(--f-mono);
    font-size: 8px; color: var(--muted);
    margin-top: 1px;
    letter-spacing: 0.5px;
  }
  .hud-weapon .slot canvas { display: block; margin: 0 auto; }

  /* bottom-right hint */
  .hud-hint {
    position: absolute; right: 14px; bottom: 14px;
    font-family: var(--f-mono);
    font-size: 9px; color: var(--muted);
    display: grid; grid-template-columns: auto 1fr;
    gap: 2px 10px; letter-spacing: 1px;
  }
  .hud-hint .kb {
    font-family: var(--f-mono);
    font-size: 9px;
    padding: 1px 5px;
    border: 1px solid var(--border);
    background: var(--panel2);
    color: var(--fg);
    border-radius: 2px;
  }

  /* damage vignette overlay */
  .damage-vignette {
    position: absolute; inset: 0; pointer-events: none;
    box-shadow: inset 0 0 100px 20px rgba(210,75,53,0.0);
    transition: box-shadow 0.15s;
    z-index: 4;
  }

  /* notice / banner */
  .notice {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    background: rgba(11,12,14,0.85);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 8px 16px;
    font-family: var(--f-display);
    font-size: 14px;
    letter-spacing: 3px;
    pointer-events: none;
    z-index: 5;
  }
  .wave-banner {
    position: absolute; top: 28%; left: 50%; transform: translateX(-50%);
    font-family: var(--f-display);
    font-size: 80px;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(210,75,53,0.5);
    letter-spacing: 8px;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .wave-banner.show { opacity: 1; }

  /* messages */
  .error { color: var(--danger); font-size: 12px; margin-top: 6px; font-family: var(--f-mono); }
  .ok    { color: var(--toxic);  font-size: 12px; margin-top: 6px; font-family: var(--f-mono); }

  /* mute button */
  .mute-btn {
    position: absolute; top: 14px; right: 230px;
    z-index: 8;
    background: rgba(11,12,14,0.78);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-family: var(--f-mono);
    font-size: 10px;
    color: var(--fg);
    cursor: pointer;
    letter-spacing: 1px;
  }
  .mute-btn:hover { border-color: var(--accent); }

  /* ---------- Menu / Game Over layouts ---------- */
  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 14px;
  }
  .menu-grid .col {
    background: var(--panel2);
    border: 1px solid var(--border);
    padding: 16px;
  }
  .menu-grid h3 {
    margin: 0 0 10px;
    font-family: var(--f-display);
    font-size: 16px; letter-spacing: 3px;
    color: var(--muted);
  }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-cell {
    padding: 10px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
  }
  .stat-cell.accent { border-top: 2px solid var(--accent); }
  .stat-cell .l { font-family: var(--f-body); font-size: 9px; letter-spacing: 2px; color: var(--muted); }
  .stat-cell .v { font-family: var(--f-display); font-size: 28px; letter-spacing: 1px; line-height: 1; margin-top: 2px; }
  .stat-cell.accent .v { color: var(--accent); }
  .stat-cell .tag { font-family: var(--f-mono); font-size: 9px; color: var(--muted); margin-top: 4px; }

  .weapon-breakdown { margin-top: 12px; }
  .weapon-breakdown .row-w {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 4px;
    font-size: 12px;
  }
  .weapon-breakdown .row-w .nm {
    width: 76px; font-family: var(--f-display); font-size: 14px; letter-spacing: 2px;
  }
  .weapon-breakdown .row-w .bar {
    flex: 1; height: 5px; background: var(--border); border-radius: 1px;
  }
  .weapon-breakdown .row-w .bar .fill {
    height: 100%; background: var(--accent); border-radius: 1px;
  }
  .weapon-breakdown .row-w .ct {
    width: 30px; text-align: right; font-family: var(--f-mono); font-size: 12px;
  }
  .weapon-breakdown .row-w .ic {
    width: 26px; display: flex; justify-content: center;
  }

  .scroll { max-height: 60vh; overflow-y: auto; }
  .scroll::-webkit-scrollbar { width: 6px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .sep { height: 1px; background: var(--border); margin: 14px 0; }

  /* signal line ornament */
  .signal {
    font-family: var(--f-mono);
    font-size: 11px; letter-spacing: 6px;
    color: var(--muted);
  }
  .signal .x { color: var(--accent); }

  .desktop-only { display: none; }
  @media (hover: none) {
    .desktop-only { display: flex; }
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="game" width="1024" height="768"></canvas>

  <!-- mobile block -->
  <div id="mobile-block" class="overlay desktop-only" style="z-index:100">
    <div class="panel" style="text-align:center">
      <h1 class="title">ZOMBIE SURVIVAL</h1>
      <p>This game requires a keyboard and mouse.<br/>Please open on a desktop browser.</p>
    </div>
  </div>

  <!-- overlays injected by JS go here -->
  <div id="overlay-root"></div>
  <div id="hud-root" class="hud" style="display:none"></div>
  <div id="vignette-root" class="damage-vignette" style="display:none"></div>
  <div id="banner-root"></div>
  <button id="mute-btn" class="mute-btn" style="display:none">SOUND ON</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.0/dist/pocketbase.umd.js"></script>
<script src="sprites.js"></script>
<script>
(() => {
'use strict';

// ---------- Constants ----------
const WORLD_W = 1600, WORLD_H = 1200;
const VIEW_W = 1024, VIEW_H = 768;
const TICK_HZ = 60;
const TICK_DT = 1 / TICK_HZ;
const PB_URL = 'https://raspberrypi.tail0bf0ce.ts.net:8443';
const COL_SCORES = 'proj_zombie_survival_scores';
const PREFS_KEY = 'zombie-survival:prefs';

// ---------- Utilities ----------
const rand = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b));
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const dist2 = (a, b) => { const dx = a.x - b.x, dy = a.y - b.y; return dx*dx + dy*dy; };
const len = (x, y) => Math.hypot(x, y);
const norm = (x, y) => { const l = Math.hypot(x, y) || 1; return [x/l, y/l]; };
const lerp = (a, b, t) => a + (b - a) * t;
const choice = arr => arr[Math.floor(Math.random() * arr.length)];
const now = () => performance.now() / 1000;

function circleRectCollide(cx, cy, cr, rx, ry, rw, rh) {
  const nx = clamp(cx, rx, rx + rw);
  const ny = clamp(cy, ry, ry + rh);
  const dx = cx - nx, dy = cy - ny;
  return dx*dx + dy*dy < cr*cr;
}
function resolveCircleRect(e, rect) {
  const nx = clamp(e.x, rect.x, rect.x + rect.w);
  const ny = clamp(e.y, rect.y, rect.y + rect.h);
  const dx = e.x - nx, dy = e.y - ny;
  const d = Math.hypot(dx, dy);
  if (d === 0) {
    // inside rect — push out toward nearest edge
    const left = Math.abs(e.x - rect.x);
    const right = Math.abs(rect.x + rect.w - e.x);
    const top = Math.abs(e.y - rect.y);
    const bot = Math.abs(rect.y + rect.h - e.y);
    const m = Math.min(left, right, top, bot);
    if (m === left) e.x = rect.x - e.r;
    else if (m === right) e.x = rect.x + rect.w + e.r;
    else if (m === top) e.y = rect.y - e.r;
    else e.y = rect.y + rect.h + e.r;
    return true;
  }
  if (d < e.r) {
    e.x = nx + (dx / d) * e.r;
    e.y = ny + (dy / d) * e.r;
    return true;
  }
  return false;
}
function segmentRectHit(x1, y1, x2, y2, r) {
  // Liang-Barsky clip
  const dx = x2 - x1, dy = y2 - y1;
  let t0 = 0, t1 = 1;
  const p = [-dx, dx, -dy, dy];
  const q = [x1 - r.x, r.x + r.w - x1, y1 - r.y, r.y + r.h - y1];
  for (let i = 0; i < 4; i++) {
    if (p[i] === 0) {
      if (q[i] < 0) return null;
    } else {
      const t = q[i] / p[i];
      if (p[i] < 0) { if (t > t1) return null; if (t > t0) t0 = t; }
      else { if (t < t0) return null; if (t < t1) t1 = t; }
    }
  }
  return { t: t0, x: x1 + t0 * dx, y: y1 + t0 * dy };
}

// ---------- Audio ----------
const Audio = (() => {
  let ctx = null, master = null;
  let muted = !!prefs.muted;
  function ensure() {
    if (ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    ctx = new AC();
    master = ctx.createGain();
    master.gain.value = muted ? 0 : 0.25;
    master.connect(ctx.destination);
  }
  function setMuted(m) {
    muted = m;
    prefs.muted = m;
    savePrefs();
    if (master) master.gain.value = m ? 0 : 0.25;
  }
  function tone(freq, dur, type = 'square', vol = 0.2, slide = 0) {
    if (muted) return;
    ensure(); if (!ctx) return;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    if (slide) osc.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), ctx.currentTime + dur);
    g.gain.value = vol;
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.connect(g); g.connect(master);
    osc.start(); osc.stop(ctx.currentTime + dur);
  }
  function noise(dur, vol = 0.3, bp = 1200) {
    if (muted) return;
    ensure(); if (!ctx) return;
    const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const bpFilter = ctx.createBiquadFilter();
    bpFilter.type = 'bandpass'; bpFilter.frequency.value = bp; bpFilter.Q.value = 0.8;
    const g = ctx.createGain(); g.gain.value = vol;
    src.connect(bpFilter); bpFilter.connect(g); g.connect(master);
    src.start();
  }
  const sfx = {
    pistol: () => { tone(440, 0.06, 'square', 0.15, -200); noise(0.05, 0.15, 2000); },
    shotgun: () => { tone(180, 0.12, 'sawtooth', 0.2, -80); noise(0.15, 0.35, 800); },
    smg: () => { tone(620, 0.04, 'square', 0.1, -150); noise(0.03, 0.1, 3000); },
    rocket: () => { tone(120, 0.3, 'sawtooth', 0.2, -60); noise(0.3, 0.15, 400); },
    reload: () => { tone(300, 0.08, 'triangle', 0.1); setTimeout(() => tone(400, 0.08, 'triangle', 0.1), 80); },
    hit: () => { tone(140, 0.08, 'sawtooth', 0.15, -40); },
    hurt: () => { tone(220, 0.15, 'sawtooth', 0.2, -100); },
    groan: () => { tone(90 + Math.random() * 20, 0.25, 'sawtooth', 0.08, -30); },
    explosion: () => { noise(0.5, 0.5, 200); tone(60, 0.4, 'sawtooth', 0.3, -30); },
    pickup: () => { tone(660, 0.08, 'square', 0.15); setTimeout(() => tone(880, 0.08, 'square', 0.15), 60); },
    wave: () => { tone(440, 0.15, 'square', 0.15); setTimeout(() => tone(660, 0.15, 'square', 0.15), 120); },
    dead: () => { tone(220, 0.4, 'sawtooth', 0.3, -150); setTimeout(() => tone(110, 0.6, 'sawtooth', 0.3, -80), 200); },
    click: () => { tone(800, 0.03, 'square', 0.1); },
    empty: () => { tone(200, 0.05, 'square', 0.1); },
  };
  return { sfx, setMuted, muted: () => muted, ensure };
})();

const $ = sel => document.querySelector(sel);
const el = (tag, attrs = {}, ...children) => {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'style') e.style.cssText = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
};

// ---------- Waves ----------
function buildWave(n) {
  // n starts from 1
  const q = [];
  const walkers = Math.floor(6 + n * 2.2);
  const runners = Math.max(0, Math.floor((n - 1) * 1.4));
  const tanks = n >= 3 ? Math.floor((n - 2) * 0.6) : 0;
  const fires = n >= 5 ? Math.floor((n - 4) * 0.4) : 0;
  for (let i = 0; i < walkers; i++) q.push('walker');
  for (let i = 0; i < runners; i++) q.push('runner');
  for (let i = 0; i < tanks; i++) q.push('tank');
  for (let i = 0; i < fires; i++) q.push('fire');
  // shuffle
  for (let i = q.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [q[i], q[j]] = [q[j], q[i]];
  }
  return q;
}

function startWave(n) {
  Game.wave = n;
  Game.waveState = 'fighting';
  Game.spawnQueue = buildWave(n);
  Game.spawnTimer = 0;
  setBanner(`WAVE ${n}`, 1.8);
  Audio.sfx.wave();
  // unlock weapons at certain waves
  if (n === 2) unlockWeapon('shotgun', 12, 'SHOTGUN UNLOCKED');
  if (n === 3) unlockWeapon('smg', 80, 'SMG UNLOCKED');
  if (n === 4) unlockWeapon('barrel', 3, 'BARRELS UNLOCKED — Space to place');
  if (n === 5) unlockWeapon('rocket', 3, 'ROCKET LAUNCHER UNLOCKED');
}

function unlockWeapon(key, reserve, notice) {
  const p = Game.player;
  p.unlocked[key] = true;
  const w = WEAPONS[key];
  if (w.magSize === Infinity) {
    p.ammo[key].mag = Infinity;
    p.ammo[key].reserve = Infinity;
  } else {
    p.ammo[key].mag = w.magSize;
    p.ammo[key].reserve = reserve;
  }
  setNotice(notice, 3);
  Audio.sfx.pickup();
}

function spawnZombieAtEdge(type) {
  const def = ZOMBIES[type];
  const player = Game.player;
  // pick random point near world edge, at least 500px from player
  let x, y, tries = 0;
  do {
    const side = randi(0, 4);
    if (side === 0) { x = rand(40, WORLD_W - 40); y = rand(20, 80); }
    else if (side === 1) { x = rand(40, WORLD_W - 40); y = rand(WORLD_H - 80, WORLD_H - 20); }
    else if (side === 2) { x = rand(20, 80); y = rand(40, WORLD_H - 40); }
    else { x = rand(WORLD_W - 80, WORLD_W - 20); y = rand(40, WORLD_H - 40); }
    tries++;
    if (tries > 20) break;
  } while (Math.hypot(x - player.x, y - player.y) < 400 || inObstacle(x, y, def.radius + 4));
  Game.zombies.push({
    type, x, y, r: def.radius, hp: def.hp, maxHp: def.hp,
    speed: def.speed, damage: def.damage, color: def.color, score: def.score,
    isFire: def.isFire || false,
    onFire: 0, // time remaining on fire
    hitCd: 0, stunned: 0,
    vx: 0, vy: 0,
    angle: 0, walkPhase: Math.random(),
  });
}

function inObstacle(x, y, r) {
  for (const o of Game.level.obstacles) {
    if (circleRectCollide(x, y, r, o.x, o.y, o.w, o.h)) return true;
  }
  return false;
}

// ---------- Player update ----------
function updatePlayer(dt) {
  const p = Game.player;
  if (p.dead) return;

  let mx = 0, my = 0;
  if (input.keys.has('w')) my -= 1;
  if (input.keys.has('s')) my += 1;
  if (input.keys.has('a')) mx -= 1;
  if (input.keys.has('d')) mx += 1;
  if (mx || my) { const [nx, ny] = norm(mx, my); mx = nx; my = ny; }

  const speed = 220;
  p.vx = mx * speed; p.vy = my * speed;
  p.x += p.vx * dt;
  p.y += p.vy * dt;

  // walk cycle + muzzle flash decay
  if (mx || my) p.walkPhase = (p.walkPhase + dt * 4) % 1;
  if (p.muzzleFlash > 0) p.muzzleFlash -= dt * 8;
  if (p.muzzleFlash < 0) p.muzzleFlash = 0;

  // collide with obstacles
  for (const o of Game.level.obstacles) resolveCircleRect(p, o);
  // world bounds
  p.x = clamp(p.x, p.r, WORLD_W - p.r);
  p.y = clamp(p.y, p.r, WORLD_H - p.r);

  // aim
  const ang = Math.atan2((input.mouseY + Game.camera.y) - p.y, (input.mouseX + Game.camera.x) - p.x);
  p.angle = ang;
  input.wx = input.mouseX + Game.camera.x;
  input.wy = input.mouseY + Game.camera.y;

  // camera follow
  const targetCx = clamp(p.x - VIEW_W / 2, 0, WORLD_W - VIEW_W);
  const targetCy = clamp(p.y - VIEW_H / 2, 0, WORLD_H - VIEW_H);
  Game.camera.x = lerp(Game.camera.x, targetCx, 0.15);
  Game.camera.y = lerp(Game.camera.y, targetCy, 0.15);

  // iframes
  if (p.iframe > 0) p.iframe -= dt;

  // weapon switching
  for (let i = 0; i < WEAPON_ORDER.length; i++) {
    if (input.keys.has(String(i + 1))) {
      const k = WEAPON_ORDER[i];
      if (p.unlocked[k] && p.weapon !== k) {
        p.weapon = k;
        p.reloading = 0;
        p.fireCd = 0.1;
        Audio.sfx.click();
      }
    }
  }

  // reload
  if (input.keys.has('r')) {
    const w = WEAPONS[p.weapon];
    const a = p.ammo[p.weapon];
    if (w.magSize !== Infinity && p.reloading <= 0 && a.mag < w.magSize && a.reserve > 0) {
      p.reloading = w.reloadTime;
      Audio.sfx.reload();
    }
  }
  if (p.reloading > 0) {
    p.reloading -= dt;
    if (p.reloading <= 0) {
      const w = WEAPONS[p.weapon];
      const a = p.ammo[p.weapon];
      const need = w.magSize - a.mag;
      const taken = Math.min(need, a.reserve);
      a.mag += taken;
      a.reserve -= taken;
      p.reloading = 0;
    }
  }

  // shoot
  if (p.fireCd > 0) p.fireCd -= dt;
  if (p.placeCd > 0) p.placeCd -= dt;

  const weap = WEAPONS[p.weapon];
  if (weap.isPlacer) {
    // Space to place barrel
    if (input.keys.has(' ') && p.placeCd <= 0 && p.ammo.barrel.reserve > 0) {
      placeBarrel(p.x + Math.cos(p.angle) * 30, p.y + Math.sin(p.angle) * 30);
      p.ammo.barrel.reserve--;
      p.placeCd = 0.4;
    }
  } else {
    if (input.mouseDown && p.fireCd <= 0 && p.reloading <= 0) {
      const a = p.ammo[p.weapon];
      if (a.mag > 0) {
        fireWeapon(p, weap);
        p.fireCd = weap.fireRate;
        if (weap.magSize !== Infinity) a.mag--;
        // auto-reload if empty and reserve available
        if (weap.magSize !== Infinity && a.mag === 0 && a.reserve > 0) {
          p.reloading = weap.reloadTime;
          Audio.sfx.reload();
        }
      } else if (a.reserve > 0 && p.reloading <= 0) {
        p.reloading = weap.reloadTime;
        Audio.sfx.reload();
      } else {
        // empty click throttle
        if (p.fireCd <= 0) { Audio.sfx.empty(); p.fireCd = 0.3; }
      }
    }
  }

  // Space to place barrel when not barrel weapon
  if (input.keys.has(' ') && !weap.isPlacer && p.placeCd <= 0 && p.unlocked.barrel && p.ammo.barrel.reserve > 0) {
    placeBarrel(p.x + Math.cos(p.angle) * 30, p.y + Math.sin(p.angle) * 30);
    p.ammo.barrel.reserve--;
    p.placeCd = 0.4;
  }
}

function placeBarrel(x, y) {
  // validate position
  if (inObstacle(x, y, 14)) { setNotice('Can\'t place there', 1); return; }
  if (x < 20 || y < 20 || x > WORLD_W - 20 || y > WORLD_H - 20) { setNotice('Out of bounds', 1); return; }
  Game.barrels.push({ x, y, r: 14, hp: 30, ignited: false, igniteT: 0 });
  Audio.sfx.click();
}

function fireWeapon(p, weap) {
  Audio.sfx[weap.sfx]();
  p.muzzleFlash = 1;
  const muzzleX = p.x + Math.cos(p.angle) * (p.r + 4);
  const muzzleY = p.y + Math.sin(p.angle) * (p.r + 4);

  // muzzle flash particle
  for (let i = 0; i < 3; i++) {
    Game.particles.push({
      x: muzzleX, y: muzzleY,
      vx: Math.cos(p.angle) * rand(100, 300) + rand(-30, 30),
      vy: Math.sin(p.angle) * rand(100, 300) + rand(-30, 30),
      life: rand(0.05, 0.15), color: '#ffcc55', r: rand(2, 4),
    });
  }

  if (weap.isRocket) {
    Game.rockets.push({
      x: muzzleX, y: muzzleY,
      vx: Math.cos(p.angle) * weap.bulletSpeed,
      vy: Math.sin(p.angle) * weap.bulletSpeed,
      life: weap.bulletRange / weap.bulletSpeed,
      owner: 'player',
      explodeRadius: weap.explodeRadius,
      damage: weap.damage,
    });
    return;
  }

  for (let k = 0; k < weap.pellets; k++) {
    const ang = p.angle + (Math.random() - 0.5) * weap.spread * 2 * (weap.pellets > 1 ? 1 : 1);
    Game.bullets.push({
      x: muzzleX, y: muzzleY,
      vx: Math.cos(ang) * weap.bulletSpeed,
      vy: Math.sin(ang) * weap.bulletSpeed,
      life: weap.bulletRange / weap.bulletSpeed,
      damage: weap.damage,
      owner: 'player',
      weapon: p.weapon,
    });
  }
}

// ---------- Bullets ----------
function updateBullets(dt) {
  const L = Game.level;
  outer: for (let i = Game.bullets.length - 1; i >= 0; i--) {
    const b = Game.bullets[i];
    const px = b.x, py = b.y;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    if (b.life <= 0) { Game.bullets.splice(i, 1); continue; }
    // obstacle hit
    for (const o of L.obstacles) {
      if (circleRectCollide(b.x, b.y, 1, o.x, o.y, o.w, o.h)) {
        spawnSpark(b.x, b.y);
        Game.bullets.splice(i, 1);
        continue outer;
      }
    }
    // zombie hit
    for (let j = Game.zombies.length - 1; j >= 0; j--) {
      const z = Game.zombies[j];
      const dx = b.x - z.x, dy = b.y - z.y;
      if (dx*dx + dy*dy < z.r * z.r) {
        damageZombie(z, j, b.damage, b.weapon);
        spawnBlood(b.x, b.y, Math.atan2(b.vy, b.vx));
        Game.bullets.splice(i, 1);
        continue outer;
      }
    }
    // barrel hit
    for (let j = Game.barrels.length - 1; j >= 0; j--) {
      const br = Game.barrels[j];
      const dx = b.x - br.x, dy = b.y - br.y;
      if (dx*dx + dy*dy < br.r * br.r) {
        br.hp -= b.damage;
        spawnSpark(b.x, b.y);
        Game.bullets.splice(i, 1);
        if (br.hp <= 0) { explodeBarrel(j); }
        continue outer;
      }
    }
    // world bounds
    if (b.x < 0 || b.x > WORLD_W || b.y < 0 || b.y > WORLD_H) {
      Game.bullets.splice(i, 1);
    }
  }
}

function updateRockets(dt) {
  const L = Game.level;
  outer: for (let i = Game.rockets.length - 1; i >= 0; i--) {
    const r = Game.rockets[i];
    r.x += r.vx * dt; r.y += r.vy * dt;
    r.life -= dt;
    // smoke trail
    Game.particles.push({
      x: r.x - r.vx * 0.01, y: r.y - r.vy * 0.01,
      vx: rand(-20, 20), vy: rand(-20, 20),
      life: rand(0.3, 0.6), color: '#888', r: rand(3, 6),
    });
    if (r.life <= 0) { explodeAt(r.x, r.y, r.explodeRadius, r.damage, 'rocket'); Game.rockets.splice(i, 1); continue; }
    for (const o of L.obstacles) {
      if (circleRectCollide(r.x, r.y, 3, o.x, o.y, o.w, o.h)) {
        explodeAt(r.x, r.y, r.explodeRadius, r.damage, 'rocket');
        Game.rockets.splice(i, 1);
        continue outer;
      }
    }
    for (let j = Game.zombies.length - 1; j >= 0; j--) {
      const z = Game.zombies[j];
      const dx = r.x - z.x, dy = r.y - z.y;
      if (dx*dx + dy*dy < (z.r + 3) * (z.r + 3)) {
        explodeAt(r.x, r.y, r.explodeRadius, r.damage, 'rocket');
        Game.rockets.splice(i, 1);
        continue outer;
      }
    }
    if (r.x < 0 || r.x > WORLD_W || r.y < 0 || r.y > WORLD_H) Game.rockets.splice(i, 1);
  }
}

function explodeAt(x, y, radius, damage, source) {
  Audio.sfx.explosion();
  Game.explosions.push({ x, y, r: 0, maxR: radius, t: 0 });
  // shake
  screenShake(12, 0.4);
  for (let i = 0; i < 24; i++) {
    Game.particles.push({
      x, y,
      vx: Math.cos(i / 24 * Math.PI * 2) * rand(120, 260),
      vy: Math.sin(i / 24 * Math.PI * 2) * rand(120, 260),
      life: rand(0.3, 0.6), color: i % 2 ? '#ff8a33' : '#ffd54a', r: rand(3, 6),
    });
  }
  // damage zombies
  for (let j = Game.zombies.length - 1; j >= 0; j--) {
    const z = Game.zombies[j];
    const d = Math.hypot(z.x - x, z.y - y);
    if (d < radius) {
      const falloff = 1 - d / radius;
      damageZombie(z, j, damage * falloff, source);
    }
  }
  // chain barrels
  for (let j = Game.barrels.length - 1; j >= 0; j--) {
    const br = Game.barrels[j];
    const d = Math.hypot(br.x - x, br.y - y);
    if (d < radius + br.r) {
      if (!br.ignited) { br.ignited = true; br.igniteT = 0.15; }
    }
  }
  // damage player
  const p = Game.player;
  if (!p.dead) {
    const d = Math.hypot(p.x - x, p.y - y);
    if (d < radius) {
      const falloff = 1 - d / radius;
      damagePlayer(Math.max(8, 30 * falloff));
    }
  }
}

function explodeBarrel(index) {
  const br = Game.barrels[index];
  Game.barrels.splice(index, 1);
  explodeAt(br.x, br.y, 120, 100, 'barrel');
}

let shakeAmt = 0, shakeTime = 0;
function screenShake(amt, dur) { shakeAmt = Math.max(shakeAmt, amt); shakeTime = Math.max(shakeTime, dur); }

// ---------- Zombie damage ----------
function damageZombie(z, index, damage, weapon) {
  z.hp -= damage;
  z.stunned = 0.05;
  Audio.sfx.hit();
  if (z.hp <= 0) {
    killZombie(z, index, weapon);
  }
}
function killZombie(z, index, weapon) {
  // splat
  for (let i = 0; i < 12; i++) {
    Game.particles.push({
      x: z.x, y: z.y,
      vx: rand(-200, 200), vy: rand(-200, 200),
      life: rand(0.4, 0.8), color: '#9a1a1a', r: rand(2, 5),
    });
  }
  // fire zombie ignites nearby
  if (z.isFire) {
    for (const other of Game.zombies) {
      if (other === z) continue;
      if (Math.hypot(other.x - z.x, other.y - z.y) < 120) other.onFire = Math.max(other.onFire, 2);
    }
  }
  Game.kills++;
  if (weapon && Game.weaponKills[weapon] != null) Game.weaponKills[weapon]++;
  Game.score += z.score * (1 + (Game.wave - 1) * 0.1);
  // pickup drop
  if (Math.random() < 0.13) spawnPickup(z.x, z.y);
  Game.zombies.splice(index, 1);
}

function spawnPickup(x, y) {
  const p = Game.player;
  const opts = ['health', 'ammo_shotgun', 'ammo_smg', 'ammo_rocket', 'barrel'];
  const weights = [
    3,
    p.unlocked.shotgun ? 3 : 0,
    p.unlocked.smg ? 3 : 0,
    p.unlocked.rocket ? 1.5 : 0,
    p.unlocked.barrel ? 1 : 0,
  ];
  const total = weights.reduce((a, b) => a + b, 0);
  if (total === 0) return;
  let r = Math.random() * total, pick = 'health';
  for (let i = 0; i < opts.length; i++) { r -= weights[i]; if (r <= 0) { pick = opts[i]; break; } }
  Game.pickups.push({ x, y, r: 12, type: pick, life: 20 });
}

function damagePlayer(amount) {
  const p = Game.player;
  if (p.iframe > 0 || p.dead) return;
  p.hp -= amount;
  p.iframe = 0.6;
  Audio.sfx.hurt();
  screenShake(6, 0.2);
  if (p.hp <= 0) {
    p.hp = 0;
    p.dead = true;
    Audio.sfx.dead();
    setTimeout(() => { if (Game.mode === 'playing') showGameOver(); }, 900);
  }
}

function spawnBlood(x, y, ang) {
  for (let i = 0; i < 4; i++) {
    Game.particles.push({
      x, y,
      vx: Math.cos(ang) * rand(40, 120) + rand(-40, 40),
      vy: Math.sin(ang) * rand(40, 120) + rand(-40, 40),
      life: rand(0.3, 0.7), color: '#a81f1f', r: rand(2, 4),
    });
  }
}
function spawnSpark(x, y) {
  for (let i = 0; i < 3; i++) {
    Game.particles.push({
      x, y, vx: rand(-120, 120), vy: rand(-120, 120),
      life: rand(0.1, 0.25), color: '#ffe066', r: rand(1, 3),
    });
  }
}

// ---------- Zombies ----------
function updateZombies(dt) {
  const p = Game.player;
  const zs = Game.zombies;
  for (let i = 0; i < zs.length; i++) {
    const z = zs[i];
    if (z.stunned > 0) { z.stunned -= dt; continue; }
    // steering toward player
    let dx = p.x - z.x, dy = p.y - z.y;
    const d = Math.hypot(dx, dy) || 1;
    dx /= d; dy /= d;
    // separation
    let sx = 0, sy = 0;
    for (let j = 0; j < zs.length; j++) {
      if (i === j) continue;
      const o = zs[j];
      const ddx = z.x - o.x, ddy = z.y - o.y;
      const dd = Math.hypot(ddx, ddy);
      if (dd > 0 && dd < z.r + o.r + 6) {
        sx += ddx / dd * (1 - dd / (z.r + o.r + 6));
        sy += ddy / dd * (1 - dd / (z.r + o.r + 6));
      }
    }
    let vx = dx + sx * 1.5;
    let vy = dy + sy * 1.5;
    const vl = Math.hypot(vx, vy) || 1;
    vx /= vl; vy /= vl;
    z.x += vx * z.speed * dt;
    z.y += vy * z.speed * dt;
    // facing + walk cycle
    z.angle = Math.atan2(dy, dx);
    z.walkPhase = (z.walkPhase + dt * (z.speed / 35)) % 1;
    // obstacles
    for (const o of Game.level.obstacles) resolveCircleRect(z, o);
    z.x = clamp(z.x, z.r, WORLD_W - z.r);
    z.y = clamp(z.y, z.r, WORLD_H - z.r);

    // on fire
    if (z.onFire > 0) {
      z.onFire -= dt;
      if (Math.random() < 0.5) {
        Game.particles.push({ x: z.x + rand(-z.r, z.r), y: z.y + rand(-z.r, z.r), vx: rand(-20, 20), vy: rand(-60, -20), life: 0.3, color: '#ff7a33', r: rand(2, 4) });
      }
      z.hp -= 8 * dt;
      if (z.hp <= 0) { killZombie(z, i, 'barrel'); i--; continue; }
    }

    // fire zombie ignites neighbors in contact
    if (z.isFire) {
      for (const other of zs) {
        if (other === z) continue;
        if (Math.hypot(other.x - z.x, other.y - z.y) < z.r + other.r + 4) {
          if (other.onFire < 1.5) other.onFire = 2;
        }
      }
    }

    // touch barrels -> damage them
    for (let k = Game.barrels.length - 1; k >= 0; k--) {
      const br = Game.barrels[k];
      if (Math.hypot(br.x - z.x, br.y - z.y) < br.r + z.r) {
        // push back zombie
        const ddx = z.x - br.x, ddy = z.y - br.y;
        const dd = Math.hypot(ddx, ddy) || 1;
        z.x += ddx / dd * 2; z.y += ddy / dd * 2;
        br.hp -= 15 * dt * z.damage * 0.3;
        if (br.hp <= 0) explodeBarrel(k);
      }
    }

    // damage player on contact
    z.hitCd -= dt;
    if (z.hitCd < 0) z.hitCd = 0;
    if (Math.hypot(p.x - z.x, p.y - z.y) < p.r + z.r) {
      if (z.hitCd <= 0) {
        damagePlayer(z.damage);
        z.hitCd = 0.6;
      }
    }

    // groan occasionally
    if (Math.random() < 0.002) Audio.sfx.groan();
  }
}

// ---------- Barrels ----------
function updateBarrels(dt) {
  for (let i = Game.barrels.length - 1; i >= 0; i--) {
    const br = Game.barrels[i];
    if (br.ignited) {
      br.igniteT -= dt;
      if (Math.random() < 0.6) Game.particles.push({
        x: br.x + rand(-6, 6), y: br.y + rand(-6, 6),
        vx: rand(-30, 30), vy: rand(-80, -30),
        life: 0.3, color: '#ffb040', r: rand(2, 4),
      });
      if (br.igniteT <= 0) { explodeBarrel(i); }
    }
  }
}

// ---------- Pickups ----------
function updatePickups(dt) {
  const p = Game.player;
  for (let i = Game.pickups.length - 1; i >= 0; i--) {
    const pk = Game.pickups[i];
    pk.life -= dt;
    if (pk.life <= 0) { Game.pickups.splice(i, 1); continue; }
    if (Math.hypot(p.x - pk.x, p.y - pk.y) < p.r + pk.r) {
      applyPickup(pk.type);
      Game.pickups.splice(i, 1);
      Audio.sfx.pickup();
    }
  }
}
function applyPickup(type) {
  const p = Game.player;
  switch (type) {
    case 'health': p.hp = Math.min(p.maxHp, p.hp + 35); setNotice('+35 HP', 1.5); break;
    case 'ammo_shotgun':
      if (!p.unlocked.shotgun) unlockWeapon('shotgun', 12, 'SHOTGUN PICKED UP');
      p.ammo.shotgun.reserve += 12; setNotice('+12 shells', 1.5); break;
    case 'ammo_smg':
      if (!p.unlocked.smg) unlockWeapon('smg', 80, 'SMG PICKED UP');
      p.ammo.smg.reserve += 60; setNotice('+60 rounds', 1.5); break;
    case 'ammo_rocket':
      if (!p.unlocked.rocket) unlockWeapon('rocket', 3, 'ROCKETS PICKED UP');
      p.ammo.rocket.reserve += 2; setNotice('+2 rockets', 1.5); break;
    case 'barrel':
      if (!p.unlocked.barrel) unlockWeapon('barrel', 3, 'BARRELS PICKED UP');
      p.ammo.barrel.reserve += 2; setNotice('+2 barrels', 1.5); break;
  }
}

// ---------- Explosions ----------
function updateExplosions(dt) {
  for (let i = Game.explosions.length - 1; i >= 0; i--) {
    const ex = Game.explosions[i];
    ex.t += dt;
    ex.r = lerp(0, ex.maxR, Math.min(1, ex.t / 0.3));
    if (ex.t > 0.6) Game.explosions.splice(i, 1);
  }
}

// ---------- Particles ----------
function updateParticles(dt) {
  for (let i = Game.particles.length - 1; i >= 0; i--) {
    const p = Game.particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life -= dt;
    if (p.life <= 0) Game.particles.splice(i, 1);
  }
}

// ---------- Wave control ----------
function updateWaves(dt) {
  if (Game.waveState === 'breather') {
    Game.waveTimer -= dt;
    if (Game.waveTimer <= 0) {
      startWave(Game.wave + 1);
    }
  } else if (Game.waveState === 'fighting') {
    // spawn queued
    if (Game.spawnQueue.length > 0) {
      Game.spawnTimer -= dt;
      if (Game.spawnTimer <= 0) {
        const t = Game.spawnQueue.shift();
        spawnZombieAtEdge(t);
        Game.spawnTimer = rand(0.2, 0.7);
      }
    } else if (Game.zombies.length === 0) {
      // wave done
      Game.waveState = 'breather';
      Game.waveTimer = 5;
      setBanner('WAVE CLEARED — ' + Math.ceil(Game.waveTimer) + 's', 2);
      // score bonus
      Game.score += 50 * Game.wave;
      // random drop
      if (Math.random() < 0.6) spawnPickup(Game.player.x + rand(-100, 100), Game.player.y + rand(-100, 100));
    }
  }
}

// ---------- Main tick ----------
function tick(dt) {
  if (Game.mode !== 'playing') return;
  Game.elapsed += dt;
  updatePlayer(dt);
  updateZombies(dt);
  updateBullets(dt);
  updateRockets(dt);
  updateBarrels(dt);
  updatePickups(dt);
  updateExplosions(dt);
  updateParticles(dt);
  updateWaves(dt);
  if (shakeTime > 0) { shakeTime -= dt; if (shakeTime <= 0) { shakeAmt = 0; } }
}

// ---------- Render ----------
function render(alpha) {
  // clear
  ctx.fillStyle = '#07080a';
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  ctx.save();
  let shakeX = 0, shakeY = 0;
  if (shakeAmt > 0) { shakeX = (Math.random() - 0.5) * shakeAmt; shakeY = (Math.random() - 0.5) * shakeAmt; }
  ctx.translate(-Game.camera.x + shakeX, -Game.camera.y + shakeY);

  if (Game.level) {
    const style = Game.level.style || 'parking';

    // ground tiles + world border
    ZSprites.drawGround(ctx, Game.camera, VIEW_W, VIEW_H, WORLD_W, WORLD_H, style);

    // obstacles
    for (const o of Game.level.obstacles) ZSprites.drawObstacle(ctx, o, style);

    // pickups
    for (const pk of Game.pickups) ZSprites.drawPickup(ctx, pk, now());

    // barrels
    for (const br of Game.barrels) ZSprites.drawBarrel(ctx, br, now());

    // zombies
    for (const z of Game.zombies) ZSprites.drawZombie(ctx, z);

    // player
    if (Game.player && !Game.player.dead) {
      const p = Game.player;
      ZSprites.drawPlayer(ctx, p.x, p.y, p.angle, {
        weapon: p.weapon,
        moving: !!(p.vx || p.vy),
        walkPhase: p.walkPhase || 0,
        iframe: p.iframe || 0,
        muzzleFlash: p.muzzleFlash || 0,
      });
    }

    // rockets
    for (const r of Game.rockets) ZSprites.drawRocket(ctx, r);

    // bullets
    for (const b of Game.bullets) ZSprites.drawBullet(ctx, b);

    // particles
    for (const p of Game.particles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, Math.min(1, p.life * 2));
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // explosions
    for (const ex of Game.explosions) ZSprites.drawExplosion(ctx, ex);
  }

  ctx.restore();

  // minimap top-right of canvas
  drawMinimap();
}

function drawMinimap() {
  const w = 156, h = 108;
  const x = VIEW_W - w - 14, y = 80;
  // panel
  ctx.fillStyle = 'rgba(11,12,14,0.78)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#2a2e36'; ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
  // header
  ctx.fillStyle = '#7a7e88';
  ctx.font = '9px "Manrope", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('SECTOR · 0' + ((Game.levelIndex || 0) + 1), x + w / 2, y - 6);

  const padX = 8, padY = 8;
  const mw = w - padX * 2, mh = h - padY * 2;
  const sx = mw / WORLD_W, sy = mh / WORLD_H;
  ctx.save();
  ctx.beginPath(); ctx.rect(x + padX, y + padY, mw, mh); ctx.clip();

  // ground
  ctx.fillStyle = '#0e1014';
  ctx.fillRect(x + padX, y + padY, mw, mh);

  // obstacles
  if (Game.level) {
    ctx.fillStyle = '#3a3f4a';
    for (const o of Game.level.obstacles) {
      ctx.fillRect(x + padX + o.x * sx, y + padY + o.y * sy, Math.max(1, o.w * sx), Math.max(1, o.h * sy));
    }
  }
  // barrels
  ctx.fillStyle = '#a04a2a';
  for (const br of Game.barrels) ctx.fillRect(x + padX + br.x * sx - 1, y + padY + br.y * sy - 1, 2, 2);
  // pickups
  ctx.fillStyle = '#8ec547';
  for (const pk of Game.pickups) ctx.fillRect(x + padX + pk.x * sx - 1, y + padY + pk.y * sy - 1, 2, 2);
  // zombies
  ctx.fillStyle = '#d24b35';
  for (const z of Game.zombies) ctx.beginPath(), ctx.arc(x + padX + z.x * sx, y + padY + z.y * sy, 1.4, 0, Math.PI * 2), ctx.fill();
  // player + FOV
  if (Game.player) {
    const px = x + padX + Game.player.x * sx;
    const py = y + padY + Game.player.y * sy;
    ctx.fillStyle = 'rgba(232,230,223,0.18)';
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.arc(px, py, 18, Game.player.angle - 0.5, Game.player.angle + 0.5);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#7fb6ff';
    ctx.beginPath(); ctx.arc(px, py, 2.5, 0, Math.PI * 2); ctx.fill();
  }
  // camera frame
  ctx.strokeStyle = '#7a7e88';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + padX + Game.camera.x * sx, y + padY + Game.camera.y * sy, VIEW_W * sx, VIEW_H * sy);
  ctx.restore();
  ctx.textAlign = 'start';
}

// ---------- HUD (DOM) ----------
const WEAPON_INFO = {
  pistol:  'INFINITE · SEMI',
  shotgun: '6 PELLET · BUCK',
  smg:     'AUTO · 14 RPS',
  rocket:  'AoE · 120 DMG',
  barrel:  'PLACE · CHAIN',
};

// cache mini weapon icon canvases so we don't re-draw every frame
const __slotIconCache = {};
function getWeaponSlotIcon(type) {

  const c = document.createElement('canvas');
  c.width = 36; c.height = 36;

  cx.translate(9, 9);

  __slotIconCache[type] = c.toDataURL();
  return __slotIconCache[type];
}
function drawWeaponIconShape(ctx, type) {

  } else if (type === 'shotgun') {

  } else if (type === 'smg') {
    ctx.fillStyle = '#cfd0d3'; ctx.fillRect(-7, -2.5, 12, 3);
    ctx.fillRect(-3, 0.5, 4, 5);
    ctx.fillStyle = '#e3a83a'; ctx.fillRect(-6, -3, 2, 1);
  } else if (type === 'rocket') {
    ctx.fillStyle = '#3a4a3a'; ctx.fillRect(-9, -3.5, 15, 7);
    ctx.fillStyle = '#d24b35';
    ctx.beginPath(); ctx.moveTo(6, -3.5); ctx.lineTo(10, 0); ctx.lineTo(6, 3.5);
    ctx.closePath(); ctx.fill();
  } else if (type === 'barrel') {
    ctx.fillStyle = '#a04a2a'; ctx.fillRect(-4, -6, 8, 12);
    ctx.fillStyle = '#5a230f'; ctx.fillRect(-4, -6, 8, 1.5);
    ctx.fillRect(-4, 4.5, 8, 1.5);
  }
}

let __lastHudHtml = '';
let __lastHudKey = '';
function renderHUD() {
  const root = $('#hud-root');
  const vignette = $('#vignette-root');
  if (Game.mode !== 'playing') {
    root.style.display = 'none';
    if (vignette) vignette.style.display = 'none';
    return;
  }
  root.style.display = 'block';
  if (vignette) {
    vignette.style.display = 'block';
    const p = Game.player;
    const lowPct = Math.max(0, 1 - p.hp / p.maxHp);
    const hurt = p.iframe > 0 ? 0.6 : lowPct * 0.45;
    vignette.style.boxShadow = `inset 0 0 100px 20px rgba(210,75,53,${hurt})`;
  }

  const p = Game.player;
  const w = WEAPONS[p.weapon];
  const a = p.ammo[p.weapon];
  const hpPct = Math.max(0, p.hp / p.maxHp);
  const hpPips = 20;
  const hpFilled = Math.round(hpPct * hpPips);
  const hpLow = hpPct < 0.3;

  // mag bar
  let magTicks = [];
  let magText = '';
  if (w.magSize === Infinity) {
    magText = '∞';
    magTicks = Array.from({ length: 20 }, () => true);
  } else {
    magText = a.mag + '';
    for (let i = 0; i < w.magSize; i++) magTicks.push(i < a.mag);
  }

  // weapon slots
  const slotsHtml = WEAPON_ORDER.map(k => {
    const wd = WEAPONS[k];
    const unlocked = p.unlocked[k];
    const active = k === p.weapon;
    const ammoData = p.ammo[k];
    let ammoLabel = '';
    if (!unlocked) ammoLabel = '–';
    else if (wd.magSize === Infinity) ammoLabel = '∞';
    else ammoLabel = String(ammoData.reserve + ammoData.mag);
    const empty = unlocked && wd.magSize !== Infinity && ammoData.reserve + ammoData.mag === 0;
    return `<div class="slot ${active ? 'active' : ''} ${!unlocked ? 'locked' : empty ? 'empty' : ''}" data-weapon="${k}">
      <div class="key">${wd.key}</div>
      <img src="${getWeaponSlotIcon(k)}" width="18" height="18" alt="${wd.name}" style="opacity:${active ? 1 : 0.7}" />
      <div class="ammo-count">${ammoLabel}</div>
    </div>`;
  }).join('');

  // ammo display
  const isPistol = w.magSize === Infinity;
  const ammoDisp = isPistol
    ? `<span style="color:var(--accent)">∞</span>`
    : `<span>${a.mag}</span><span class="res"> / ${a.reserve === Infinity ? '∞' : a.reserve}</span>`;
  const reloadingClass = p.reloading > 0 ? 'reloading' : '';
  const reloadingText = p.reloading > 0 ? `<div class="info" style="color:var(--warn)">RELOADING · ${p.reloading.toFixed(1)}s</div>` : `<div class="info">${WEAPON_INFO[p.weapon] || ''}</div>`;

  // wave meta
  let waveMeta = '';
  if (Game.waveState === 'breather' && Game.wave > 0) {
    waveMeta = `NEXT IN ${Math.ceil(Game.waveTimer)}s`;
  } else if (Game.waveState === 'fighting') {
    waveMeta = `${Game.zombies.length + Game.spawnQueue.length} LEFT`;
  } else {
    waveMeta = 'STAND BY';
  }

  const html = `
    <div class="hud-box hud-vitals">
      <div class="hud-head">
        <span class="label">VITALS</span>
        <span class="val">${Math.ceil(p.hp)}/${p.maxHp}</span>
      </div>
      <div class="pips">
        ${Array.from({ length: hpPips }, (_, i) =>
          `<div class="pip ${i < hpFilled ? (hpLow ? 'low' : 'on') : ''}"></div>`
        ).join('')}
      </div>
    </div>

    <div class="hud-box hud-wave">
      <div class="lbl">WAVE</div>
      <div class="num">${String(Game.wave || 0).padStart(2, '0')}</div>
      <div class="meta">${waveMeta}</div>
    </div>

    <div class="hud-box hud-stats">
      <div class="stat-row accent">
        <span class="l">KILLS</span>
        <span class="v">${Game.kills}</span>
      </div>
      <div class="stat-row">
        <span class="l">SCORE</span>
        <span class="v">${Math.floor(Game.score)}</span>
      </div>
      <div class="stat-row muted">
        <span class="l">TIME</span>
        <span class="v">${formatTime(Game.elapsed)}</span>
      </div>
    </div>

    <div class="hud-box hud-weapon">
      <div class="head">
        <div class="icon-box"><img src="${getWeaponSlotIcon(p.weapon)}" width="18" height="18" alt="${w.name}" /></div>
        <div class="meta">
          <div class="name">${w.name.toUpperCase()}</div>
          ${reloadingText}
        </div>
        <div class="ammo ${reloadingClass}">${ammoDisp}</div>
      </div>
      ${w.magSize !== Infinity ? `
      <div class="mag-bar">
        ${magTicks.map(on => `<div class="tick ${on ? 'on' : ''}"></div>`).join('')}
      </div>` : ''}
      <div class="slots">${slotsHtml}</div>
    </div>

    <div class="hud-box hud-hint">
      <span class="kb">WASD</span><span>MOVE</span>
      <span class="kb">LMB</span><span>SHOOT</span>
      <span class="kb">R</span><span>RELOAD</span>
      <span class="kb">␣</span><span>BARREL</span>
      <span class="kb">ESC</span><span>PAUSE</span>
    </div>

    ${Game.noticeUntil > now() ? `<div class="notice">${escapeHtml(Game.notice)}</div>` : ''}
    ${Game.bannerUntil > now() ? `<div class="wave-banner show">${escapeHtml(Game.bannerText)}</div>` : ''}
  `;

  if (html !== __lastHudHtml) {
    root.innerHTML = html;
    __lastHudHtml = html;
    // wire weapon slot clicks
    root.querySelectorAll('.slot').forEach(el => {
      el.addEventListener('click', () => {
        const k = el.getAttribute('data-weapon');
        const player = Game.player;
        if (player && player.unlocked[k]) {
          player.weapon = k;
          player.reloading = 0;
          player.fireCd = 0.1;
          Audio.sfx.click();
        }
      });
    });
  }
}

function formatTime(s) {
  const m = Math.floor(s / 60), ss = Math.floor(s % 60);
  return m + ':' + (ss < 10 ? '0' + ss : ss);
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

// ---------- Loop ----------
let last = performance.now(), acc = 0;
function loop(t) {
  const dt = Math.min(0.1, (t - last) / 1000);
  last = t;
  if (Game.mode === 'playing') {
    acc += dt;
    while (acc >= TICK_DT) {
      tick(TICK_DT);
      acc -= TICK_DT;
    }
  }
  render();
  renderHUD();
  requestAnimationFrame(loop);
}
requestAnimationFrame(t => { last = t; requestAnimationFrame(loop); });

function drawMenuBg(canvas) {
  canvas.width = canvas.clientWidth || 960;
  canvas.height = canvas.clientHeight || 540;
  const c = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  c.fillStyle = '#0b0c0e'; c.fillRect(0, 0, w, h);
  // tiled ground
  ZSprites.drawGround(c, { x: 0, y: 0 }, w, h, w, h, 'parking');
  c.fillStyle = 'rgba(11,12,14,0.5)'; c.fillRect(0, 0, w, h);
  // a horde silhouette in the middle distance
  for (let i = 0; i < 18; i++) {
    const x = (w * 0.35) + (i * 28) + Math.sin(i) * 40;
    const y = (h * 0.45) + Math.cos(i * 1.3) * 60;
    ZSprites.drawZombie(c, {
      type: i % 6 === 0 ? 'tank' : i % 7 === 0 ? 'fire' : i % 4 === 0 ? 'runner' : 'walker',
      x, y, r: i % 6 === 0 ? 22 : 14,
      hp: 50, maxHp: 50, angle: -2.5 + Math.cos(i) * 0.4,
      walkPhase: i * 0.13,
    });
  }
  // hero silhouette far left
  ZSprites.drawPlayer(c, w * 0.18, h * 0.6, 0.3, {
    weapon: 'shotgun', moving: false, walkPhase: 0,
    iframe: 0, muzzleFlash: 0.4,
  });
  // red glow on right
  const g = c.createRadialGradient(w * 0.7, h * 0.5, 50, w * 0.7, h * 0.5, w * 0.6);
  g.addColorStop(0, 'rgba(210,75,53,0.22)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = g; c.fillRect(0, 0, w, h);
  // vignette
  const v = c.createRadialGradient(w/2, h*0.6, 100, w/2, h*0.6, w*0.7);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, 'rgba(0,0,0,0.6)');
  c.fillStyle = v; c.fillRect(0, 0, w, h);
}

  WEAPON_ORDER.forEach(k => {

      el('div', { class: 'ct' }, String(kills)),

  overlayRoot.appendChild(el('div', { class: 'overlay' },
    el('div', { class: 'panel', style: 'max-width:680px;border-top-color:var(--accent);text-align:center' },
      el('div', { class: 'signal' }, '/ / / / / ', el('span', { class: 'x' }, 'SIGNAL LOST'), ' / / / / /'),
      el('h1', { class: 'title', style: 'font-size:96px;letter-spacing:8px;color:var(--accent);text-shadow:0 0 40px rgba(210,75,53,0.4);margin-top:6px' }, 'YOU DIED'),
      el('div', { style: 'font-family:var(--f-mono);font-size:11px;letter-spacing:4px;color:var(--muted);margin-top:2px' },
        `OPERATOR · ${(prefs.name || 'ANON').toUpperCase()} · TERMINATED ${formatTime(Game.elapsed)}`),
      el('div', { class: 'sep' }),
      el('div', { class: 'stat-grid' },
        el('div', { class: 'stat-cell' },
          el('div', { class: 'l' }, 'WAVES'),
          el('div', { class: 'v' }, String(wavesSurvived).padStart(2, '0')),
          el('div', { class: 'tag' }, Game.kills + ' kills total'),
        ),
        el('div', { class: 'stat-cell' },
          el('div', { class: 'l' }, 'TIME'),
          el('div', { class: 'v' }, formatTime(Game.elapsed)),
          el('div', { class: 'tag' }, 'survived'),
        ),
        el('div', { class: 'stat-cell accent' },
          el('div', { class: 'l' }, 'SCORE'),
          el('div', { class: 'v' }, String(finalScore)),
          el('div', { class: 'tag' }, '+50 / wave bonus'),
        ),
        el('div', { class: 'stat-cell' },
          el('div', { class: 'l' }, 'KILLS'),
          el('div', { class: 'v' }, String(Game.kills)),
          el('div', { class: 'tag' }, totalKills + ' tracked'),
        ),
      ),
      breakdown,
      el('div', { class: 'sep' }),
      el('div', { class: 'row' },
        submitBtn,
        el('button', { onclick: () => { Audio.sfx.click(); startGame(Game.levelIndex); } },
          el('span', {}, 'RETRY'), el('span', { class: 'kbd-hint' }, 'R')),
        el('button', { class: 'ghost', onclick: () => { Audio.sfx.click(); showMenu(); } },
          el('span', {}, 'MENU'), el('span', { class: 'kbd-hint' }, 'ESC')),
      ),
      statusEl,
      el('div', { class: 'sep' }),
      el('div', { class: 'eyebrow', style: 'color:var(--muted)' }, '◇ TOP 10 OPERATORS'),
      lbWrap,
    )
  ));
  refreshLb();
}

function showLeaderboard() {
  Game.mode = 'leaderboard';
  clearOverlay();
  let sortKey = '-score';
  const body = el('tbody');
  const statusEl = el('div', { style: 'margin-top:8px' });

  async function refresh() {
    body.innerHTML = '';
    statusEl.textContent = 'Loading…';
    statusEl.className = '';
    try {
      const items = await fetchLeaderboard(sortKey);
      statusEl.textContent = '';
      if (!items.length) {
        body.appendChild(el('tr', {}, el('td', { colspan: '6', class: 'lb-empty' }, 'No scores yet')));
        return;
      }
      items.forEach((it, i) => {
        body.appendChild(el('tr', {},
          el('td', {}, String(i + 1)),
          el('td', {}, it.player_name || '—'),
          el('td', {}, String(it.score || 0)),
          el('td', {}, String(it.waves_survived || 0)),
          el('td', {}, String(it.kills || 0)),
          el('td', {}, formatTime(it.duration_seconds || 0)),
        ));
      });
    } catch (e) {
      statusEl.textContent = 'Leaderboard offline';
      statusEl.className = 'error';
    }
  }

  const mkHead = (label, key) => el('th', { onclick: () => { sortKey = key; refresh(); } }, label);

  overlayRoot.appendChild(el('div', { class: 'overlay' },
    el('div', { class: 'panel', style: 'max-width:640px' },
      el('div', { class: 'eyebrow' }, '◇ ALL TIME'),
      el('h2', {}, 'LEADERBOARD'),
      el('div', { class: 'sub' }, 'TOP 20 OPERATORS · CLICK COLUMN TO SORT'),
      el('div', { class: 'scroll' },
        el('table', { class: 'lb-table' },
          el('thead', {}, el('tr', {},
            mkHead('#', '-score'),
            mkHead('Name', 'player_name'),
            mkHead('Score ▾', '-score'),
            mkHead('Waves ▾', '-waves_survived'),
            mkHead('Kills ▾', '-kills'),
            mkHead('Time', '-duration_seconds'),
          )),
          body,
        ),
      ),
      statusEl,
      el('div', { class: 'sep' }),
      el('button', { class: 'ghost', onclick: () => { Audio.sfx.click(); showMenu(); } }, '← BACK'),
    )
  ));
  refresh();
}

// ---------- Esc handling ----------
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (Game.mode === 'playing') showPause();
    else if (Game.mode === 'paused') { clearOverlay(); Game.mode = 'playing'; }
  }
});

// ---------- Mute button ----------
const muteBtn = $('#mute-btn');
function refreshMuteBtn() {
  muteBtn.textContent = Audio.muted() ? '◇ MUTED' : '◉ SOUND';
}
muteBtn.addEventListener('click', () => {
  Audio.setMuted(!Audio.muted());
  refreshMuteBtn();
});
refreshMuteBtn();

// ---------- Boot ----------
showMenu();

})();
</script>
</body>
</html>
