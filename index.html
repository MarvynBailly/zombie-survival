<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Outbreak — Zombie Survival</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<!--
  PocketBase collections used by this game (already created on the tailnet PB).
  Schemas for reference:

  proj_zombie_survival_scores
    player_name        text, required, max 24
    score              number (int), required
    waves_survived     number (int), required  (now stores DAYS survived; field name kept for schema compat)
    kills              number (int), required
    duration_seconds   number (int), required
    weapon_stats       json
    created            autodate
    list/view/create:  "" (open on tailnet)
    update/delete:     admin-only

  proj_zombie_survival_runs (optional telemetry)
    player_name        text
    events             json
    list/view/update/delete: admin-only
    create:            "" (open)
-->
</head>
<body>
<div id="app">
  <canvas id="game" width="1024" height="768"></canvas>

  <!-- mobile block -->
  <div id="mobile-block" class="overlay desktop-only" style="z-index:100">
    <div class="panel" style="text-align:center">
      <h1 class="title">ZOMBIE SURVIVAL</h1>
      <p>This game requires a keyboard and mouse.<br/>Please open on a desktop browser.</p>
    </div>
  </div>

  <!-- overlays injected by JS go here -->
  <div id="overlay-root"></div>
  <div id="hud-root" class="hud" style="display:none"></div>
  <div id="vignette-root" class="damage-vignette" style="display:none"></div>
  <div id="banner-root"></div>
  <button id="mute-btn" class="mute-btn" style="display:none">SOUND ON</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.0/dist/pocketbase.umd.js"></script>
<script src="sprites.js"></script>
<!-- Expansion sprite pack (drop-in IIFEs that attach ZExpand / ZProps /
     ZBestiary to window). Must load AFTER sprites.js so the dispatch shims
     inside sprites.js can see the new namespaces. -->
<script src="expansion.js"></script>
<script src="props.js"></script>
<script src="bestiary.js"></script>
<!-- Game modules. Loaded in dependency order; each file is a top-level script
     sharing the global lexical scope. -->
<script src="constants.js"></script>
<script src="world.js"></script>
<script src="persistence.js"></script>
<script src="defs.js"></script>
<script src="items.js"></script>
<script src="perks.js"></script>
<script src="squad.js"></script>
<script src="game.js"></script>
<script src="render.js"></script>
<script src="ui.js"></script>
<script src="bot.js"></script>
<!-- Bot Arena: per-bot competition harness. See competition/SPEC.md for the
     bot API. api.js + harness.js must load BEFORE the individual bot files;
     ui.js must load AFTER ui.js so it can wrap showMenu(). -->
<script src="competition/api.js"></script>
<script src="competition/harness.js"></script>
<script src="competition/bots/bot_random.js"></script>
<script src="competition/bots/bot_simple.js"></script>
<script src="competition/bots/bot_marvyn.js"></script>
<!-- Agent-designed bots -->
<script src="competition/bots/bot_fortress.js"></script>
<script src="competition/bots/bot_sniper.js"></script>
<script src="competition/bots/bot_berserker.js"></script>
<script src="competition/bots/bot_scavenger.js"></script>
<script src="competition/bots/bot_tactician.js"></script>
<script src="competition/bots/bot_predictor.js"></script>
<script src="competition/bots/bot_demolitionist.js"></script>
<script src="competition/bots/bot_hunter.js"></script>
<script src="competition/ui.js"></script>
</body>
</html>
